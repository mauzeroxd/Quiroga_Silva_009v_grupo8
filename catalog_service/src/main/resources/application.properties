# Nombre del Microservicio
spring.application.name=catalog_service
server.port=8081

# Conexión a Base de Datos (Nexus Catalog)
# 'db-catalog' es el nombre del contenedor definido en docker-compose
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Migraciones Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# Logs
logging.level.com.nexus=DEBUG
# URLs a otros microservicios (valores por defecto para entorno Docker)
inventory.service.url=http://inventory-service:8082