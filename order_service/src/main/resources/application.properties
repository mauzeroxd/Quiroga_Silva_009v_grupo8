# Configuración del Microservicio
spring.application.name=order-service
server.port=8085

# Conexión a Base de Datos (db-order es el nombre en el docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway (Migraciones)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# URLs para Clientes Feign (Comunicación Interna)
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8080}
catalog.service.url=${CATALOG_SERVICE_URL:http://localhost:8081}