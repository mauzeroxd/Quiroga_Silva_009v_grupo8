services:
  # --- BASES DE DATOS ---
  db-auth:
    image: mysql:8.0
    container_name: db-auth
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nexus_auth_db
    ports:
      - "3308:3306"

  db-catalog:
    image: mysql:8.0
    container_name: db-catalog
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nexus_catalog_db
    ports:
      - "3306:3306"

  db-inventory:
    image: mysql:8.0
    container_name: db-inventory
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nexus_inventory_db
    ports:
      - "3307:3306"

  # --- MICROSERVICIOS ---
  auth-service:
    build: ./auth_service
    container_name: auth-service
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-auth:3306/nexus_auth_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on:
      - db-auth

  catalog-service:
    build: ./catalog_service
    container_name: catalog-service
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-catalog:3306/nexus_catalog_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on:
      - db-catalog

  inventory-service:
    build: ./inventory_service
    container_name: inventory-service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-inventory:3306/nexus_inventory_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      CATALOG_SERVICE_URL: http://catalog-service:8081
    depends_on:
      - db-inventory
      - catalog-service