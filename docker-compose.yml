services:

  # ==========================================
  # 1. AUTH SERVICE (Puerto: 8080 | DB: 3308)
  # ==========================================
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nexus_auth_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql

  auth-service:
    build:
      context: ./auth_service
    container_name: auth-service
    restart: always
    depends_on:
      - mysql-auth
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/nexus_auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

